<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Login - UPI Fraud Detection</title>
  
  <!-- Favicons -->
  <link href="../static/img/favicon.png" rel="icon">
  <link href="../static/img/apple-touch-icon.png" rel="apple-touch-icon">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="../static/vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../static/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: white;
      border-radius: 15px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
      max-width: 900px;
      width: 100%;
    }

    .login-wrapper {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 500px;
    }

    .login-left {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .login-left h2 {
      font-size: 2rem;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .login-left p {
      font-size: 1rem;
      opacity: 0.9;
      line-height: 1.6;
    }

    .login-left-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.8;
    }

    .login-right {
      padding: 50px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-right h3 {
      font-size: 1.8rem;
      color: #333;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-group input {
      width: 100%;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      font-family: 'Poppins', sans-serif;
      transition: border-color 0.3s;
    }

    .form-group input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .login-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      margin-top: 1rem;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s;
    }

    .back-link a:hover {
      color: #764ba2;
    }

    .error-message {
      color: #e74c3c;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      display: none;
    }

    @media (max-width: 768px) {
      .login-wrapper {
        grid-template-columns: 1fr;
      }

      .login-left {
        padding: 30px 20px;
        min-height: 250px;
      }

      .login-right {
        padding: 30px 20px;
      }

      .login-left h2 {
        font-size: 1.5rem;
      }

      .login-right h3 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>

<body>

  <div class="login-container">
    <div class="login-wrapper">
      <!-- Left Side -->
      <div class="login-left">
        <div class="login-left-icon">
          <i class="bi bi-shield-check"></i>
        </div>
        <h2>Welcome Back</h2>
        <p>Access your UPI fraud detection dashboard and analyze transactions with our advanced ML system.</p>
      </div>

      <!-- Right Side -->
      <div class="login-right">
        <h3>Login</h3>
        <form id="loginForm">
          <div class="form-group">
            <label for="uname">Username</label>
            <input type="text" id="uname" name="uname" placeholder="Enter your username" required>
            <div class="error-message" id="unameError">Username is required</div>
          </div>

          <div class="form-group">
            <label for="pwd">Password</label>
            <input type="password" id="pwd" name="pwd" placeholder="Enter your password" required>
            <div class="error-message" id="pwdError">Password is required</div>
          </div>

          <button type="button" class="login-btn" onclick="login()">Login</button>

          <div class="back-link">
            <a href="{{ url_for('first') }}"><i class="bi bi-arrow-left"></i> Back to Home</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    function login() {
      const uname = document.getElementById("uname").value.trim();
      const pwd = document.getElementById("pwd").value.trim();
      const unameError = document.getElementById("unameError");
      const pwdError = document.getElementById("pwdError");

      // Reset errors
      unameError.style.display = "none";
      pwdError.style.display = "none";

      // Validation
      if (!uname) {
        unameError.style.display = "block";
        return;
      }
      if (!pwd) {
        pwdError.style.display = "block";
        return;
      }

      // Check credentials
      if (uname === "admin" && pwd === "admin") {
        alert("Login Successful!");
        window.location = "{{ url_for('prediction1') }}";
      } else {
        alert("Invalid Credentials! Please try again.");
      }
    }

    // Allow Enter key to submit
    document.getElementById("pwd").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        login();
      }
    });
  </script>

  <script src="../static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>

</body>

</html>
